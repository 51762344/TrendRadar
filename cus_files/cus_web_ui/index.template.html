<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__SITE_TITLE__</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./custom-ui/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <div class="topline">
            <span class="site-mark">Radar</span>
            <span class="site-sub" id="topline-date">更新中</span>
          </div>
          <h1 id="site-title">__SITE_TITLE__</h1>
        </div>
        <div class="hero-panel">
          <div class="stats-grid" id="stats-grid"></div>
          <label class="search-box">
            <input id="search-input" type="search" placeholder="搜索：比特币、任天堂、芯片" />
          </label>
        </div>
      </header>

      <main class="content">
        <section class="section">
          <div class="section-head">
            <h2>主题</h2>
          </div>
          <div class="topic-grid" id="topic-grid"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>快照</h2>
          </div>
          <div class="snapshot-grid" id="snapshot-grid"></div>
        </section>

        <section class="section hidden" id="rss-section">
          <div class="section-head">
            <h2>RSS</h2>
          </div>
          <div class="rss-list" id="rss-list"></div>
        </section>

        <section class="section empty-state hidden" id="empty-state">
          <h2>暂无数据</h2>
          <p>等下一次抓取完成。</p>
        </section>
      </main>
    </div>

    <script src="./custom-ui/app.js" defer></script>
  </body>
</html>
