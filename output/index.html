<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engineer News Radar</title>
    <link rel="stylesheet" href="./custom-ui/styles.css?v=20260421064201" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-orb hero-orb-a" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-b" aria-hidden="true"></div>
        <div class="hero-copy">
          <div class="topline">
            <span class="site-mark">Radar</span>
            <span class="site-sub" id="topline-date">更新中</span>
          </div>
          <h1 id="site-title">Engineer News Radar</h1>
          <p class="hero-summary" id="hero-summary">把当天值得追的主题、平台快照和 RSS 更新整理到一页里。</p>
        </div>
        <div class="hero-panel">
          <div class="stats-grid" id="stats-grid"></div>
          <label class="search-box">
            <input id="search-input" type="search" placeholder="搜索：比特币、任天堂、芯片" aria-label="搜索主题与快照内容" />
          </label>
          <div class="search-meta hidden" id="search-meta" aria-live="polite"></div>
        </div>
      </header>

      <main class="content">
        <section class="section" id="topics-section">
          <div class="section-head">
            <div>
              <p class="section-kicker">Topics</p>
              <h2>主题</h2>
            </div>
            <p class="section-meta" id="topics-meta">按关键词聚合</p>
          </div>
          <div class="topic-grid" id="topic-grid"></div>
        </section>

        <section class="section" id="snapshot-section">
          <div class="section-head">
            <div>
              <p class="section-kicker">Snapshot</p>
              <h2>快照</h2>
            </div>
            <p class="section-meta" id="snapshot-meta">平台即时榜单</p>
          </div>
          <div class="snapshot-grid" id="snapshot-grid"></div>
        </section>

        <section class="section hidden" id="rss-section">
          <div class="section-head">
            <div>
              <p class="section-kicker">Feeds</p>
              <h2>RSS</h2>
            </div>
            <p class="section-meta" id="rss-meta">订阅更新</p>
          </div>
          <div class="rss-list" id="rss-list"></div>
        </section>

        <section class="section empty-state hidden" id="empty-state">
          <h2>暂无数据</h2>
          <p>等下一次抓取完成。</p>
        </section>
      </main>
    </div>

    <script src="./custom-ui/app.js?v=20260421064201" defer></script>
  </body>
</html>
